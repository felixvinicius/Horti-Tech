<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HortiTech — Assistente Nutricional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #2d7a22;
            --green-dark: #1a4a14;
            --green-mid: #4caf40;
            --green-light: #e8f5e3;
            --green-pale: #f4faf1;
            --accent: #f7a325;
            --accent-dark: #e09520;
            --white: #ffffff;
            --border: #c8e0c2;
            --text: #1a2e0f;
            --text-muted: #5a7a52;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(30, 80, 20, .10);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--green-pale);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ── App Shell ─────────────────────────────── */
        .app {
            width: 100%;
            max-width: 480px;
            min-height: 92vh;
            max-height: 92vh;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ────────────────────────────────── */
        .header {
            background: var(--green);
            color: #fff;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            line-height: 1.1;
        }

        .header p {
            font-size: 11px;
            opacity: .75;
            margin-top: 2px;
        }

        /* ── Screens ───────────────────────────────── */
        .screen {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen.hidden {
            display: none;
        }

        /* ── Setup screen ──────────────────────────── */
        .setup-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .setup-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: var(--green-dark);
            line-height: 1.25;
        }

        .setup-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background: var(--border);
        }

        label {
            font-size: 13px;
            font-weight: 700;
            color: var(--green-dark);
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--white);
            outline: none;
            transition: border .15s;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--green-mid);
        }

        .checklist {
            max-height: 150px;
            overflow-y: auto;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 10px;
            background: var(--white);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checklist label {
            font-size: 14px;
            font-weight: normal;
            color: var(--text);
            display: flex;
            align-items: center;
            margin: 0;
            cursor: pointer;
        }

        .checklist input[type="checkbox"] {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--green);
        }

        .hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn {
            background: var(--green);
            color: #fff;
            border: none;
            padding: 13px 20px;
            border-radius: var(--radius);
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background .15s, transform .1s;
        }

        .btn:hover {
            background: var(--green-dark);
        }

        .btn:active {
            transform: scale(.98);
        }

        .btn-outline {
            background: var(--white);
            color: var(--green);
            border: 2px solid var(--green);
        }

        .btn-outline:hover {
            background: var(--green-light);
        }

        .btn-accent {
            background: var(--accent);
            color: #1a2e0f;
        }

        .btn-accent:hover {
            background: var(--accent-dark);
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Context bar ───────────────────────────── */
        .context-bar {
            background: var(--green-light);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .tag {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px 10px;
            color: var(--green-dark);
            font-weight: 700;
            font-size: 11px;
        }

        .tag-accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #1a2e0f;
        }

        /* ── Chat messages ─────────────────────────── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f8fcf6;
        }

        .bubble {
            max-width: 86%;
            padding: 11px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            animation: pop .18s ease;
        }

        @keyframes pop {
            from {
                opacity: 0;
                transform: scale(.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .bubble.user {
            background: var(--green);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bubble.ai {
            background: var(--white);
            border: 1.5px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: var(--text);
        }

        .bubble.typing {
            opacity: .6;
            font-style: italic;
        }

        .dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce .9s infinite;
        }

        .dots span:nth-child(2) {
            animation-delay: .15s;
        }

        .dots span:nth-child(3) {
            animation-delay: .30s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0)
            }

            40% {
                transform: translateY(-6px)
            }
        }

        /* ── Chat input row ────────────────────────── */
        .chat-footer {
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            background: var(--white);
        }

        .finish-wrap {
            padding: 10px 14px 0;
        }

        .input-row {
            padding: 10px 14px 12px;
            display: flex;
            gap: 8px;
        }

        .input-row input {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border .15s;
        }

        .input-row input:focus {
            border-color: var(--green-mid);
        }

        .send-btn {
            background: var(--green);
            color: #fff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, transform .1s;
        }

        .send-btn:hover {
            background: var(--green-dark);
        }

        .send-btn:active {
            transform: scale(.92);
        }

        .send-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* ── Error banner ──────────────────────────── */
        .error-banner {
            margin: 0 14px 8px;
            background: #fff3f3;
            border: 1px solid #f5c2c2;
            color: #c0392b;
            border-radius: 10px;
            padding: 9px 13px;
            font-size: 12px;
            line-height: 1.5;
        }

        /* ── SUS screen ────────────────────────────── */
        .sus-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sus-intro {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .sus-q {
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 16px;
        }

        .sus-q-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .sus-q-num {
            color: var(--green);
        }

        .likert {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }

        .likert-opt {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .likert-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            transition: all .15s;
            user-select: none;
        }

        .likert-opt:hover .likert-circle {
            border-color: var(--green-mid);
            color: var(--green);
        }

        .likert-opt.selected .likert-circle {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }

        .likert-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        /* ── Score card ────────────────────────────── */
        .score-card {
            background: var(--green);
            color: #fff;
            border-radius: 18px;
            padding: 28px;
            text-align: center;
        }

        .score-num {
            font-family: 'DM Serif Display', serif;
            font-size: 72px;
            line-height: 1;
        }

        .score-sub {
            font-size: 13px;
            opacity: .8;
            margin-top: 6px;
        }

        .score-grade {
            font-size: 22px;
            font-weight: 700;
            margin-top: 10px;
            color: var(--accent);
        }

        .info-box {
            background: var(--green-light);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 13px;
            color: var(--green-dark);
            line-height: 1.6;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- HEADER -->
        <div class="header" id="header">
            <div class="logo">🌿</div>
            <div>

        <!-- ══════════════════════════════════════════ -->

        <!-- ══════════════════════════════════════════ -->
        <div class="screen" id="screen-setup">
            <div class="setup-body">
                <div>

                        <label><input type="checkbox" value="Cajá"> Cajá</label>

                <!--  <div>
                    <label for="backend-url">🔌 URL do backend</label>
                    <input type="text" id="backend-url" value="http://localhost:3001" />
                    <p class="hint">Altere se o servidor estiver em outro endereço/porta</p>
                </div>   -->

                <button class="btn" id="btn-start">Iniciar consulta nutricional →</button>

            </div>
        </div>

        <!-- ══════════════════════════════════════════ -->
        <!-- SCREEN 2 — CHAT                           -->
        <!-- ══════════════════════════════════════════ -->
        <div class="screen hidden" id="screen-chat">

            <div class="context-bar" id="context-bar"></div>

            <div class="chat-messages" id="chat-messages"></div>

            <div class="chat-footer">
                <div id="error-area"></div>
                <div class="finish-wrap">
                    <button class="btn btn-outline" id="btn-finish" style="padding:9px;font-size:13px;">
                        ✅ Finalizar e avaliar o sistema (SUS)

        <!-- ══════════════════════════════════════════ -->
        <!-- SCREEN 3 — SUS EVALUATION                 -->
        <!-- ══════════════════════════════════════════ -->
        <div class="screen hidden" id="screen-sus">
            <div class="sus-body" id="sus-body"></div>
        </div>

    </div><!-- .app -->

    <script>
        // ── State ──────────────────────────────────────────────────────────────────
        let cart = [];
        let diet = "Nenhuma";
        let backendUrl = "";
        let messages = [];   // {role, text}
        let susAnswers = new Array(10).fill(0);
        let isLoading = false;

        // ── SUS questions ──────────────────────────────────────────────────────────
        const SUS_QUESTIONS = [
            "Eu acho que gostaria de usar esse sistema com frequência.",
            "Eu achei o sistema desnecessariamente complexo.",
            "Eu achei o sistema fácil de usar.",
            "Eu acho que precisaria de suporte técnico para usar esse sistema.",
            "Eu achei que as várias funções do sistema estavam bem integradas.",
            "Eu achei que havia muita inconsistência no sistema.",
            "Eu imagino que a maioria das pessoas aprenderia a usar esse sistema muito rapidamente.",
            "Eu achei o sistema muito difícil de usar.",
            "Eu me senti muito confiante usando o sistema.",
            "Eu precisei aprender muitas coisas antes de conseguir usar esse sistema.",
        ];

        // ── Helpers ────────────────────────────────────────────────────────────────
        function $(id) { return document.getElementById(id); }

        function showScreen(name) {
            ["setup", "chat", "sus"].forEach(s => {
                $(`screen-${s}`).classList.toggle("hidden", s !== name);
            });
        }

        function gradeLabel(score) {
            if (score >= 90) return "Excelente 🌟";
            if (score >= 80) return "Bom 👍";
            if (score >= 70) return "OK 👌";
            if (score >= 60) return "Razoável";
            return "Ruim";
        }

        function calcSUSScore(answers) {
            let total = 0;
            answers.forEach((v, i) => {
                total += i % 2 === 0 ? (v - 1) : (5 - v);
            });
            return Math.round(total * 2.5);
        }

        // ── Screen 1 — Setup ───────────────────────────────────────────────────────
        $("btn-start").addEventListener("click", () => {
            const checkboxes = document.querySelectorAll("#cart-checklist input[type='checkbox']:checked");
            cart = Array.from(checkboxes).map(cb => cb.value);
            if (cart.length === 0) { alert("Por favor, selecione os itens do carrinho."); return; }
            diet = $("diet-select").value;
            const backendField = $("backend-url");
            if (backendField) {
                backendUrl = backendField.value.trim().replace(/\/$/, "");
            }

            // context bar
            const bar = $("context-bar");
            bar.innerHTML = `<span>Carrinho:</span>` +
                cart.slice(0, 5).map(c => `<span class="tag">${c}</span>`).join("") +
                (cart.length > 5 ? `<span class="tag">+${cart.length - 5}</span>` : "") +
                `<span class="tag tag-accent">${diet}</span>`;

            // welcome message
            messages = [];
            const chatBox = $("chat-messages");
            chatBox.innerHTML = "";
            addBubble("ai", `Olá! 🌿 Sou a Nutri-Horti, sua consultora nutricional da HortiTech.\nVi que seu carrinho tem: <strong>${cart.join(", ")}</strong>.\nComo posso te ajudar com esses alimentos hoje?`);

            $("header-sub").textContent = "Nutri-Horti — Consultora IA";
            showScreen("chat");
            $("chat-input").focus();
        });

        // ── Screen 2 — Chat ────────────────────────────────────────────────────────
        function addBubble(role, html, typing = false) {
            const chatBox = $("chat-messages");
            const div = document.createElement("div");
            div.className = `bubble ${role}${typing ? " typing" : ""}`;
            if (typing) {
                div.id = "typing-indicator";
                div.innerHTML = `<span class="dots"><span></span><span></span><span></span></span>`;
            } else {
                div.innerHTML = html.replace(/\n/g, "<br>");
                messages.push({ role, text: div.textContent });
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function removeTyping() {
            const t = $("typing-indicator");
            if (t) t.remove();
        }

        function setError(msg) {
            $("error-area").innerHTML = msg
                ? `<div class="error-banner">${msg}</div>`
                : "";
        }

        async function sendMessage() {
            const input = $("chat-input");
            const txt = input.value.trim();
            if (!txt || isLoading) return;
            input.value = "";
            setError("");
            isLoading = true;
            $("btn-send").disabled = true;
            input.disabled = true;

            addBubble("user", txt);
            addBubble("ai", "", true);  // typing dots

            try {
                const res = await fetch(`${backendUrl}/api/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        userMessage: txt,
                        cartItems: cart,
                        dietaryRestrictions: diet,
                        productContext: `Itens no carrinho: ${cart.join(", ")}. Restrição alimentar: ${diet}.`,
                    }),
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.details || err.error || `HTTP ${res.status}`);
                }

                const data = await res.json();
                removeTyping();
                addBubble("ai", data.response || "Sem resposta do servidor.");

            } catch (e) {
                removeTyping();
                setError(`⚠️ Não foi possível conectar ao backend: <strong>${e.message}</strong>.<br>
      Verifique se o servidor está rodando em <code>${backendUrl}</code>.`);
                addBubble("ai", "Não consegui me conectar ao servidor agora. Verifique se o backend está rodando e tente novamente.");
            }

            isLoading = false;
            $("btn-send").disabled = false;
            input.disabled = false;
            input.focus();
        }

        $("btn-send").addEventListener("click", sendMessage);
        $("chat-input").addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

        $("btn-finish").addEventListener("click", () => {
            window.open("https://docs.google.com/forms/d/e/1FAIpQLScoErJ6yoyxKU1PBrAdjWkgyxVs2vnGw5lOiXx6ZmDjGX_0bg/viewform", "_blank");
        });

        // ── Screen 3 — SUS ─────────────────────────────────────────────────────────
        function buildSUSScreen() {
            const body = $("sus-body");
            body.innerHTML = `
    <p class="sus-intro">
      Avalie sua experiência com o assistente HortiTech. Para cada afirmação,
      selecione de <strong>1 (discordo totalmente)</strong> a <strong>5 (concordo totalmente)</strong>.
    </p>
    ${SUS_QUESTIONS.map((q, i) => `
      <div class="sus-q" id="sus-q-${i}">
        <p class="sus-q-text"><span class="sus-q-num">${i + 1}.</span> ${q}</p>
        <div class="likert" id="likert-${i}">
          ${[1, 2, 3, 4, 5].map(v => `
            <div class="likert-opt" data-q="${i}" data-v="${v}" onclick="selectLikert(${i},${v})">
              <div class="likert-circle">${v}</div>
            </div>
          `).join("")}
        </div>
        <div class="likert-labels">
          <span>Discordo totalmente</span><span>Concordo totalmente</span>
        </div>
      </div>
    `).join("")}
    <button class="btn btn-accent" onclick="submitSUS()">Calcular minha pontuação →</button>
    <div style="height:8px"></div>
  `;
        }

        function selectLikert(q, v) {
            susAnswers[q] = v;
            const row = document.querySelectorAll(`#likert-${q} .likert-opt`);
            row.forEach(opt => {
                opt.classList.toggle("selected", parseInt(opt.dataset.v) === v);
            });
        }

        function submitSUS() {
            if (susAnswers.includes(0)) {
                alert("Por favor, responda todas as 10 questões antes de calcular.");
                return;
            }
            const score = calcSUSScore(susAnswers);

            // Save to localStorage
            try {
                const saved = {
                    timestamp: new Date().toISOString(),
                    cart: cart.join(", "),
                    dietaryRestriction: diet,
                    answers: susAnswers,
                    score,
                };
                const prev = JSON.parse(localStorage.getItem("hortitech_sus") || "[]");
                prev.push(saved);
                localStorage.setItem("hortitech_sus", JSON.stringify(prev));
            } catch (e) { /* silently ignore storage errors */ }

            // Show result
            $("sus-body").innerHTML = `
    <div class="score-card">
      <div style="font-size:13px;opacity:.8;margin-bottom:8px">Sua pontuação SUS</div>
      <div class="score-num">${score}</div>
      <div class="score-sub">de 100 pontos</div>
      <div class="score-grade">${gradeLabel(score)}</div>
    </div>

    <div class="info-box">
      <strong>O que significa essa pontuação?</strong><br><br>
      O SUS (System Usability Scale) mede a usabilidade percebida do sistema em uma escala de 0 a 100.
      Pontuações acima de <strong>70</strong> indicam boa usabilidade; acima de <strong>85</strong>
      é considerado excelente. Sua resposta foi registrada para a pesquisa.
    </div>

    <div class="info-box" style="background:#fff8ec;border-color:#f5d89a;">
      ✅ Respostas salvas localmente.<br>
      Para exportar: abra o console do browser (F12) e execute:<br>
      <code style="font-size:11px">JSON.parse(localStorage.getItem('hortitech_sus'))</code>
    </div>

    <button class="btn" onclick="resetApp()">Iniciar nova sessão de teste →</button>
    <div style="height:8px"></div>
  `;
        }

        function resetApp() {
            cart = []; diet = "Nenhuma"; messages = []; susAnswers = new Array(10).fill(0);
            document.querySelectorAll("#cart-checklist input[type='checkbox']").forEach(cb => cb.checked = false);
            $("diet-select").value = "Nenhuma";
            $("header-sub").textContent = "Assistente Nutricional";
            showScreen("setup");
        }
    </script>
</body>

</html>
